<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
        <title>home</title>
        <link href="./home.css" rel="stylesheet">
    </head>

    <body>
        <nav class="sidebar">
            <a class="sidebar__icon" href=""> <img src="./pictures/menu_icon.png" alt="меню"> </a>
            <a class="sidebar__icon" href=""> <img src="./pictures/profile_icon.png" alt="профиль"> </a>
            <a class="sidebar__icon" href=""> <img src="./pictures/add_post_icon.png" alt="добавить"> </a>
        </nav>

        <main class="content">
            <div class="post">
                <div class="post__header">
                    <div class="post__user">
                        <img class="post__user_avatar" src="./pictures/VanyaDenisov.png" alt="Ваня Денисов">
                        <span class="post__user_author">Ваня Денисов</span>
                    </div>
                    <a class="post__user_edit-icon" href="#"><img src="./pictures/Edit.png" alt="редактировать"></a>
                </div>

                    <img class="post__image" src="./pictures/FirstPhoto_post.png" alt="Зима">
                    <span class="post__image-counter">1/3</span>
                </div>

                <div class="post__footer">
                    <button class="post__reaction">❤️ 203</button>
                    <div class="post__caption">
                     Так красиво сегодня на улице! Настоящая зима)) Вспоминается Бродский: «Поздно ночью, в уснувшей долине, на самом дне, в гор...
                     </div>
                     <span class="post__more">ещё</span>
                    <span class="post__time">2 часа назад</span>
                    </div>
            </div>    
            
            <div class="post">
            <nav class="post__header">
                    <div class="post__user">
                        <img class="post__user_avatar" src="./pictures/Liza_Diemina.png" alt="Лиза Дёмина">
                        <span class="post__user_author">Лиза Дёмина</span>
                    </div>
            </nav>

                <div class="post__image-container">
                    <img class="post__image" src="./pictures/SecondPhoto_post.png" alt="Цветы">
                </div>
            </div>
        </main>

    </body>

</html>
