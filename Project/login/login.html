<!DOCTYPE html>
<html lang="en">


    <head>
        <meta charset="UTF-8">
        <title>login</title>
        <link href="./login.css" rel="stylesheet">
    </head>


    <body>
        <div class="login-page">
            <!-- Контейнер для заголовка и главной картинки -->
            <div class="intro">
                <h1 class="intro__text">Войти</h1>
                <img class="intro__picture" src="./Pictures/login/main_picture.png" alt="Человек с рюкзаком">
            </div>


            <form class="auth-form" method="POST">
                <!-- Блок почты -->
                <div class="auth-form__field">
                    <label class="auth-form__field-name" for="user_Email">Электропочта</label>
                    <input class="auth-form__input" type="email" id="user_Email" name="email">
                    <span class="auth-form__label">Введите электропочту в формате *****@***.**</span>
                </div> 

                <!-- Блок пароля -->
                <div class="auth-form__field">
                    <label class="auth-form__field-name" for="user_password">Пароль</label>
                    <div class="auth-form__input-hide">
                        <input class="auth-form__input auth-form__input_password" type="password" id="user_password" name="password">
                        <img class="auth-form__icon-eye" src="./Pictures/login/password_hide_eye.png" alt="Показать пароль">
                    </div>
                </div>

                <button class="auth-form__submit" type="submit">Продолжить</button>
            </form> 
        </div>
    </body>


</html>
