<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
        <title>profile</title>
        <link href="./profyle.css" rel="stylesheet">
    </head>
    <body>
        <nav class="sidebar">
            <a class="sidebar__icon" href="#"> <img src="./pictures/menu_icon.png" alt="меню"> </a>
            <a class="sidebar__icon" href="#"> <img src="./pictures/profile_icon.png" alt="профиль"> </a>
            <a class="sidebar__icon" href="#"> <img src="./pictures/add_post_icon.png" alt="добавить"> </a>
        </nav>
        <main class="profile">
            <div class="profile__header">
                <img class="profile__avatar" src="./pictures/VanyaDenisov.png" alt="Ваня Денисов">
                <h1 class="profile__name">Ваня Денисов</h1>
                <p class="profile__description">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</p>
                <div class="profile__posts-counter">
                    <img class="profile__icons" src="./pictures/picture_icon.png" alt="картинка">
                    <p class="profile__posts-number">43 поста</p>
                </div>
            </div>
            <div class="profile__posts">
                <img class="profile__posts-photo" src="./pictures/OnePeopleWinter.png" alt="Зимний вечер">
                <img class="profile__posts-photo" src="./pictures/CocaColaHouse.png" alt="Кока-кола дом">
                <img class="profile__posts-photo" src="./pictures/ChocolateCake.png" alt="Шоколадный торт">
                <img class="profile__posts-photo" src="./pictures/friend.png" alt="Сбор друзей">
                <img class="profile__posts-photo" src="./pictures/Coffe.png" alt="Дрип-кофе">
                <img class="profile__posts-photo" src="./pictures/OldBook.png" alt="Страница старой книги">
                <img class="profile__posts-photo" src="./pictures/GoodMorning.jpg" alt="Прекрасное утро">
                <img class="profile__posts-photo" src="./pictures/Bogdan.jpg" alt="Богдан">
                <img class="profile__posts-photo" src="./pictures/ThePot.jpg" alt="Кострюля">
            </div>
        </main>
    </body>

</html>
